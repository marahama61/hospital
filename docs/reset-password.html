<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تعيين كلمة مرور جديدة - منصة حجز المستشفى</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/reset-password.css" />
  </head>

  <body>
    <header>
      <h1>منصة حجز المستشفى</h1>
      <p>سهولة وسرعة في تقديم طلبات الحجز الطبي</p>
    </header>

    <div class="main">
      <div class="reset-card">
        <h2>تعيين كلمة مرور جديدة</h2>

        <p>أدخل كلمة مرور جديدة لحسابك</p>

        <form id="resetForm">
          <input
            type="password"
            id="password"
            placeholder="كلمة المرور الجديدة"
          />

          <div class="error" id="passwordError">
            يجب أن تحتوي كلمة المرور على حرف كبير وحرف صغير و6 خانات على الأقل
          </div>

          <input
            type="password"
            id="confirmPassword"
            placeholder="تأكيد كلمة المرور"
          />

          <div class="error" id="confirmError">كلمة المرور غير متطابقة</div>

          <button type="submit">حفظ كلمة المرور</button>
        </form>
      </div>
    </div>

    <footer class="footer">
      <p style="margin: 0">جميع الحقوق محفوظة © 2026 مستشفى المغتربين</p>
    </footer>

    <script src="js/reset-password.js"></script>
  </body>
</html>
