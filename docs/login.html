<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تسجيل الدخول - منصة حجز المستشفى</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body>
    <header>
      <h1>منصة حجز المستشفى</h1>
      <p>سهولة وسرعة في تقديم طلبات الحجز الطبي</p>
    </header>

    <div class="main">
      <div class="login-card">
        <h2>تسجيل الدخول</h2>

        <div id="authAlert" class="auth-alert" style="display: none"></div>

        <p>أدخل بياناتك للوصول إلى حسابك</p>

        <form id="loginForm" novalidate>
          <input
            id="email"
            type="email"
            placeholder="البريد الإلكتروني"
            required
          />
          <input
            id="password"
            type="password"
            placeholder="كلمة المرور"
            required
          />

          <div class="forgot">
            <a href="forgot-password.html">نسيت كلمة المرور؟</a>
          </div>

          <button id="submitBtn" type="submit">دخول</button>

          <div
            id="message"
            class="message"
            role="status"
            aria-live="polite"
          ></div>
        </form>

        <div class="register-link">
          ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p style="margin: 0">جميع الحقوق محفوظة © 2026 مستشفى المغتربين</p>
    </footer>

    <script src="js/token-utils.js"></script>
    <script src="js/auth-fetch.js"></script>
    <script src="js/app-init.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
