<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>استعادة كلمة المرور - منصة حجز المستشفى</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/forgot-password.css" />
  </head>

  <body>
    <header>
      <h1>منصة حجز المستشفى</h1>
      <p>سهولة وسرعة في تقديم طلبات الحجز الطبي</p>
    </header>

    <div class="main">
      <div class="forgot-card">
        <h2>استعادة كلمة المرور</h2>

        <p>
          أدخل بريدك الإلكتروني المسجل في النظام لإرسال رابط إعادة تعيين كلمة
          المرور
        </p>

        <form id="forgotForm" novalidate>
          <input
            id="email"
            type="email"
            placeholder="البريد الإلكتروني"
            required
          />
          <div
            id="emailError"
            class="error"
            style="
              display: none;
              color: #b00020;
              font-size: 0.95rem;
              margin-top: 6px;
            "
          >
            أدخل بريدًا إلكترونيًا صالحًا
          </div>

          <button id="submitBtn" type="submit">إرسال رابط الاستعادة</button>
        </form>

        <div
          id="message"
          class="message"
          role="status"
          aria-live="polite"
        ></div>

        <div class="back-login" style="margin-top: 12px">
          <a href="login.html">العودة إلى تسجيل الدخول</a>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p style="margin: 0">جميع الحقوق محفوظة © 2026 مستشفى المغتربين</p>
    </footer>

    <script src="js/forgot-password.js"></script>
  </body>
</html>
